# ==============================================
# PRODUÇÃO - Arquivo auto-suficiente
# Uso: podman compose -f docker-compose.prod.yml up -d --build
# ==============================================

services:
  # -------- PHP-FPM (Laravel) --------
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: oportunidade
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./storage:/var/www/storage
    networks:
      - oportunidade
      - traefik_public
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-Shell", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------- Nginx (proxy interno para PHP-FPM) --------
  webserver:
    image: docker.io/library/nginx:alpine
    container_name: nginx_webserver
    restart: unless-stopped
    volumes:
      - ./docker/nginx/conf.d/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - oportunidade
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`oportunidades.senai.br`)"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -------- MySQL --------
  db:
    image: docker.io/library/mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    # Porta NÃO exposta externamente em produção!
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-oportunidade}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-oportunidade}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - oportunidade

  # -------- Redis (Cache/Sessions/Queues) --------
  redis:
    image: docker.io/library/redis:alpine
    container_name: redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - oportunidade

networks:
  oportunidade:
    driver: bridge
  traefik_public:
    external: true

volumes:
  dbdata:
  redisdata: