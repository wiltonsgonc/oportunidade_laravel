server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;
    root /var/www/public;
    index index.php;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # Logs
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;

    client_max_body_size 20M;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ \.php$ {
        fastcgi_pass laravel_app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
    }

    # Deny access to sensitive files
    location ~ /\.ht { deny all; }
    location ~ /\.git { deny all; }
    location ~ /\.env { deny all; }
    location ~ /composer\.(json|lock)$ { deny all; }

    # Block PHP execution in upload directories
    location ~ ^/storage/app/public/vagas/(anexos|editais|resultados|retificacoes)/ {
        deny all;
    }

    # Block PHP execution in temp directories
    location ~ ^/storage/framework/cache/ {
        deny all;
    }
    location ~ ^/storage/framework/views/ {
        deny all;
    }
}